// CS2 server.cfg — loaded on every map change via -exec
// MatchZy manages match-flow cvars (warmup/knife/live) via cfg/MatchZy/*.cfg.
// Keep this minimal: only globals MatchZy doesn't touch.

hostname "CS2 Dedicated Server"
rcon_password "changeme-rcon"

sv_password ""                // empty = public
sv_lan 0
sv_region 3
sv_cheats 0

// Logging
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_log_onefile 0

// GOTV
tv_enable 1
tv_maxclients 10
tv_delay 0
tv_autorecord 0
